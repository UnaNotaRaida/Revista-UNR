<!-- NOTITA QUE REBOTA — canvas para colores sólidos sin blend mode -->
<canvas id="notita"></canvas>

<script>
    const canvas = document.getElementById('notita');
    const ctx = canvas.getContext('2d');

    /* ── tamaño de la notita ── */
    const NOTITA_SIZE = 140; /* ← cambiá este valor para agrandar/achicar */

    canvas.width  = NOTITA_SIZE;
    canvas.height = NOTITA_SIZE;
    canvas.style.cssText = `
        position: fixed;
        width: ${NOTITA_SIZE}px;
        height: ${NOTITA_SIZE}px;
        z-index: 20;
        pointer-events: none;
    `;

    /* ── paleta de colores sólidos ── */
    const COLORES = ['#FFFFFF', '#1B3A1C', '#672423', '#C2730C'];
    let colorIdx = 0;

    /* ── imagen original de la notita ── */
    const imgOriginal = new Image();
    imgOriginal.crossOrigin = 'anonymous';
    imgOriginal.src = 'https://res.cloudinary.com/dblpwixyc/image/upload/v1777912844/nota_fbiskp.png';

    function dibujarNotita(color) {
        ctx.clearRect(0, 0, NOTITA_SIZE, NOTITA_SIZE);
        /* 1. pintar el color sólido */
        ctx.fillStyle = color;
        ctx.fillRect(0, 0, NOTITA_SIZE, NOTITA_SIZE);
        /* 2. recortar con la forma del PNG (respeta transparencia) */
        ctx.globalCompositeOperation = 'destination-in';
        ctx.drawImage(imgOriginal, 0, 0, NOTITA_SIZE, NOTITA_SIZE);
        /* 3. restaurar modo normal */
        ctx.globalCompositeOperation = 'source-over';
    }

    imgOriginal.onload = () => {
        dibujarNotita(COLORES[colorIdx]);
        /* posición inicial: centro del .circulo-central */
        const manos = document.querySelector('.circulo-central');
        if (manos) {
            const r = manos.getBoundingClientRect();
            x = r.left + r.width  / 2 - NOTITA_SIZE / 2 + -1;
            y = r.top  + r.height / 2 - NOTITA_SIZE / 2 + 9;
        } else {
            x = window.innerWidth  / 2 - NOTITA_SIZE / 2;
            y = window.innerHeight / 2 - NOTITA_SIZE / 2;
        }
        canvas.style.left = x + 'px';
        canvas.style.top  = y + 'px';
    };

    let x = 100, y = 100;
    let vx = 1.5, vy = 1.2;
    let started = false;

    function cambiarColor() {
        colorIdx = (colorIdx + 1) % COLORES.length;
        dibujarNotita(COLORES[colorIdx]);
    }

    window.addEventListener('scroll', () => {
        if (!started && window.scrollY > 10) {
            started = true;
            mover();
        }
    });

    function mover() {
        const maxX = window.innerWidth  - NOTITA_SIZE;
        const maxY = window.innerHeight - NOTITA_SIZE;

        x += vx;
        y += vy;

        let reboto = false;
        if (x <= 0)    { x = 0;    vx =  Math.abs(vx); reboto = true; }
        if (x >= maxX) { x = maxX; vx = -Math.abs(vx); reboto = true; }
        if (y <= 0)    { y = 0;    vy =  Math.abs(vy); reboto = true; }
        if (y >= maxY) { y = maxY; vy = -Math.abs(vy); reboto = true; }

        if (reboto) cambiarColor();

        canvas.style.left = Math.round(x) + 'px';
        canvas.style.top  = Math.round(y) + 'px';

        requestAnimationFrame(mover);
    }
</script>
