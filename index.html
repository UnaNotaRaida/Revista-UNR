<!-- SCRIPT AL FINAL, ANTES DEL CIERRE DE BODY -->
<script>
    const notita = document.getElementById('notita');
    const colores = [
        'brightness(1)',
        'brightness(0.5) sepia(1) saturate(3) hue-rotate(300deg)',
        'brightness(0.5) sepia(1) saturate(3) hue-rotate(90deg)',
        'brightness(4) sepia(1) saturate(1) hue-rotate(180deg)',
    ];
    let colorIndex = 0;
    let x, y;
    let vx = 1.5, vy = 1.2;
    let started = false;

    function cambiarColor() {
        colorIndex = (colorIndex + 1) % colores.length;
        notita.style.filter = colores[colorIndex];
    }

    function centroManos() {
        x = window.innerWidth / 2 - notita.offsetWidth / 2 - 30;
        y = 320 - notita.offsetHeight / 2;
        notita.style.left = x + 'px';
        notita.style.top = y + 'px';
    }

    window.addEventListener('load', centroManos);

    window.addEventListener('scroll', () => {
        if (!started && window.scrollY > 10) {
            started = true;
            mover();
        }
    });

    function mover() {
        const w = window.innerWidth - notita.offsetWidth;
        const h = window.innerHeight - notita.offsetHeight;

        x += vx;
        y += vy;

        let reboto = false;

        if (x <= 0) { x = 0; vx = Math.abs(vx); reboto = true; }
        if (x >= w) { x = w; vx = -Math.abs(vx); reboto = true; }
        if (y <= 0) { y = 0; vy = Math.abs(vy); reboto = true; }
        if (y >= h) { y = h; vy = -Math.abs(vy); reboto = true; }

        if (reboto) cambiarColor();

        notita.style.left = x + 'px';
        notita.style.top = y + 'px';

        requestAnimationFrame(mover);
    }
</script>
