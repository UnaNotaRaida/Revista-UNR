<!-- NOTITA -->
<canvas id="notita"></canvas>

<script>
window.addEventListener('load', () => {

const canvas = document.getElementById('notita');
const ctx = canvas.getContext('2d');

const NOTITA_SIZE = 140;

canvas.width = NOTITA_SIZE;
canvas.height = NOTITA_SIZE;

canvas.style.position = 'fixed';
canvas.style.width = NOTITA_SIZE + 'px';
canvas.style.height = NOTITA_SIZE + 'px';
canvas.style.zIndex = 20;
canvas.style.pointerEvents = 'none';

const COLORES = ['#FFFFFF', '#1B3A1C', '#672423', '#C2730C'];
let colorIdx = 0;

const imgOriginal = new Image();
imgOriginal.src = 'https://res.cloudinary.com/dblpwixyc/image/upload/v1777912844/nota_fbiskp.png';

function dibujarNotita(color) {
    ctx.clearRect(0, 0, NOTITA_SIZE, NOTITA_SIZE);
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, NOTITA_SIZE, NOTITA_SIZE);
    ctx.globalCompositeOperation = 'destination-in';
    ctx.drawImage(imgOriginal, 0, 0, NOTITA_SIZE, NOTITA_SIZE);
    ctx.globalCompositeOperation = 'source-over';
}

let x = 100, y = 100;
let vx = 1.5, vy = 1.2;

imgOriginal.onload = () => {
    dibujarNotita(COLORES[colorIdx]);

    // Esperamos a que el header cargue antes de posicionar
    setTimeout(() => {
        const manos = document.querySelector('.circulo-central');
        if (manos) {
            const r = manos.getBoundingClientRect();
            x = r.left + r.width / 2 - NOTITA_SIZE / 2;
            y = r.top + r.height / 2 - NOTITA_SIZE / 2.3;
        }
        canvas.style.left = x + 'px';
        canvas.style.top = y + 'px';
    }, 300); // espera 300ms a que el header termine de cargar
};

let started = false;

window.addEventListener('scroll', () => {
    if (!started && window.scrollY > 10) {
        started = true;
        mover();
    }
});

function cambiarColor() {
    colorIdx = (colorIdx + 1) % COLORES.length;
    dibujarNotita(COLORES[colorIdx]);
}

function mover() {
    const maxX = window.innerWidth - NOTITA_SIZE;
    const maxY = window.innerHeight - NOTITA_SIZE;

    x += vx;
    y += vy;

    let reboto = false;

    if (x <= 0 || x >= maxX) {
        vx *= -1;
        reboto = true;
    }

    if (y <= 0 || y >= maxY) {
        vy *= -1;
        reboto = true;
    }

    if (reboto) cambiarColor();

    canvas.style.left = x + 'px';
    canvas.style.top = y + 'px';

    requestAnimationFrame(mover);
}

});
</script>
